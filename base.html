<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Movies Cinema - افلام ومسلسلات جديدة 2026 | مشاهدة اونلاين{% endblock %}</title>
    <meta name="description" content="{% block description %}تابع احدث الافلام والمسلسلات مترجمة اونلاين مجانا. Movies Cinema بيجيبلك كل جديد من TMDB بجودة عالية{% endblock %}">
    <meta name="keywords" content="افلام, مسلسلات, افلام 2026, افلام اجنبي, افلام عربي, مشاهدة اونلاين, افلام مترجمة">
    <meta name="author" content="Movies Cinema">
    <link rel="canonical" href="https://moves-cinma.vercel.app{{ request.path }}" />
</head>
<body>

<footer style="background: #0a0a0a; color: #ccc; padding: 30px 20px; text-align: center; margin-top: 50px; border-top: 1px solid #222;">

    <!-- جمعت كل اللينكات في مكان واحد وزودت سياسة الخصوصية -->
    <div class="footer-links" style="margin-bottom: 20px;">
        <a href="{{ url_for('home') }}" style="color: #ccc; text-decoration: none; margin: 0 15px; transition: 0.3s;">الرئيسية</a>
        <a href="{{ url_for('favorites') }}" style="color: #ccc; text-decoration: none; margin: 0 15px; transition: 0.3s;">المفضلة</a>
        <a href="{{ url_for('about') }}" style="color: #ccc; text-decoration: none; margin: 0 15px; transition: 0.3s;">من نحن</a>
        <a href="{{ url_for('privacy') }}" style="color: #ccc; text-decoration: none; margin: 0 15px; transition: 0.3s;">سياسة الخصوصية</a>
        <a href="{{ url_for('contact') }}" style="color: #ccc; text-decoration: none; margin: 0 15px; transition: 0.3s;">اتصل بنا</a>
    </div>

    <!-- ال 3 ايقونات - حط روابطك هنا -->
    <div class="social-icons" style="margin: 20px 0;">
        <a href="https://t.me/" target="_blank" style="margin: 0 10px; font-size: 22px; color: #ccc; transition: 0.3s;"><i class="fab fa-telegram"></i></a>
        <a href="https://facebook.com/" target="_blank" style="margin: 0 10px; font-size: 22px; color: #ccc; transition: 0.3s;"><i class="fab fa-facebook-f"></i></a>
        <a href="https://twitter.com/" target="_blank" style="margin: 0 10px; font-size: 22px; color: #ccc; transition: 0.3s;"><i class="fab fa-twitter"></i></a>
    </div>

    <div class="copyright" style="font-size: 14px; margin-top: 20px;">
        <p>© 2026 داخلين سينما. جميع الحقوق محفوظة.</p>
        <p>تم التطوير بواسطة: <b style="color: white;">Fouad Abbas</b></p>
        
        <!-- ده العداد ضفتهولك هنا -->
        <p style="color:#e50914; margin-top:10px; font-weight:bold;">
            👀 عدد الزوار: {{ visitors }}
        </p>
    </div>
</footer>

<!-- سيبته زي ما هو مشلتهوش -->
<div class="series-slider">
  {% for series in series_list %}
    <div class="series-card">
      <img src="{{ series.poster }}" alt="{{ series.title }}">
      <h4>{{ series.title }}</h4>
    </div>
  {% endfor %}
</div>

<!-- الترحيب الصوتي حطيته هنا في الاخر -->
<audio id="welcome" autoplay>
  <source src="https://www.soundjay.com/human/sounds/welcome-1.mp3" type="audio/mpeg">
</audio>

</body>
</html>
